version: '3'

services:

  flask-app:

    build: .

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  mysql:

    image: mysql:8

    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flaskdb

    ports:
      - "3306:3306"
